server.port=${PORT:8080}

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/devpulse}

app.jwt.secret=${JWT_SECRET:devpulse_default_secret_change_in_production_min_32_chars_long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:2592000000}

app.admin.email=${ADMIN_EMAIL:admin@devpulse.com}
app.admin.password=${ADMIN_PASSWORD:devpulse123}

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:4201}

# ── Image upload limits ──────────────────────────────────────
# Allow up to 10MB per file (base64 encoding adds ~33% overhead)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Optional: set your Cloudinary URL to enable Cloudinary uploads
# Format: cloudinary://api_key:api_secret@cloud_name
# Get this free at https://cloudinary.com
CLOUDINARY_URL=${CLOUDINARY_URL:}

logging.level.com.devpulse=INFO
