version: '3.9'

services:

  # ── MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: devpulse-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: devpulse
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devpulse-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017/devpulse
      JWT_SECRET: ${JWT_SECRET:-devpulse_local_secret_change_in_production_min32}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-devpulse123}
      CORS_ORIGINS: http://localhost:4200,http://localhost:80,http://frontend
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Angular Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devpulse-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo-data:
    name: devpulse-mongo-data
